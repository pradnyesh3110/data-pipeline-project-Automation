name: Weekly AI Tool Scraper

on:
  schedule:
    # Runs at 03:30 UTC every Sunday (9:00 AM IST)
    - cron: "30 3 * * 0"
  workflow_dispatch: # Allows you to trigger it manually for testing

env:
  # This stops the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is CRITICAL to allow the bot to push the CSV

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas feedparser

      - name: Run Scraper
        # This executes your updated script.py
        run: python script.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output.csv
          # If no new tools are found, it won't crash the pipeline
          git commit -m "Sunday Update: AI Tools" || echo "No new tools found today"
          git push
